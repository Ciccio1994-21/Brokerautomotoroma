<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bongi Sport Car | Concessionaria Auto e Moto</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Aggiunto FontAwesome per le icone sicure -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&family=Poppins:wght@400;600&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; 
            min-height: 100vh; 
        }
        
        h1, h2, h3, h4, h5, h6, .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }

        /* Nuovi colori estratti dal volantino: Arancione Corsa e Blu Navy Scuro */
        .bg-bongi-orange { background-color: #FF5A00; }
        .text-bongi-orange { color: #FF5A00; }
        .border-bongi-orange { border-color: #FF5A00; }
        
        .bg-bongi-navy { background-color: #0F172A; }
        .text-bongi-navy { color: #0F172A; }

        .hero-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-color: #000;
        }
        
        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .hero-slide.active { opacity: 1; }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(0, 0, 0, 0.8));
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 64rem;
        }

        .ticker-wrapper {
            overflow: hidden;
            background: white;
            padding: 2rem 0;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
            position: relative;
            width: 100%;
        }
        .ticker-wrapper::before, .ticker-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            width: 150px;
            height: 100%;
            z-index: 2;
        }
        .ticker-wrapper::before {
            left: 0;
            background: linear-gradient(to right, white, transparent);
        }
        .ticker-wrapper::after {
            right: 0;
            background: linear-gradient(to left, white, transparent);
        }
        .ticker-track {
            display: inline-flex;
            animation: ticker 25s linear infinite;
        }
        .slide {
            width: 200px;
            padding: 0 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide img {
            max-width: 100%;
            max-height: 60px;
            object-fit: contain;
            transition: all 0.3s ease;
        }
        .slide:hover img {
            transform: scale(1.1);
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: white; z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #FF5A00; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-bongi-orange"></div>
            <p class="text-xs font-bold uppercase tracking-widest text-slate-400 font-montserrat">Avviamento Motore...</p>
        </div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CONFIG = {
            nomeConcessionaria: "Bongi Sport Car",
            logoUrl: "Logo1.png", 
            citta: "Alcamo", 
            provinciaBreve: "TP",
            provinciaEstesa: "Provincia di Trapani",
            cap: "91011",
            
            sottotitoloHero: "Concessionaria Auto e Moto: Nuovo, Usato e Km0. Specialisti anche nel settore edile e movimento terra.",
            descrizioneFooter: "La tua concessionaria di fiducia ad Alcamo. Passione per i motori e competenza nel settore edile dal 2017.",
            
            indirizzo: "Via Vittorio Veneto, 32",
            telefonoLink: "+393335330999", 
            telefoni: [
                { numero: "333 533 0999", nome: "Filippo", link: "+393335330999" }
            ],
            whatsappNumber: "393335330999", 
            email: "bongisportcar@libero.it",
            
            social: {
                instagram: "https://www.instagram.com/bongisportcar_/",
                facebook: "https://www.facebook.com/share/1ERsqUTEjq/?mibextid=wwXIfr"
            },
            linkGoogleFormValutazione: "https://docs.google.com/forms/d/e/1FAIpQLSeYtcqgrOejvWqClIlEUneC2LPtTNzf67413H_mxFtcnGdnbw/viewform?embedded=true",
            
            chiSiamo: {
                titoloOrigini: "La Nostra Storia dal 2017",
                paragrafo1: "Tutto è iniziato nel 2017, spinto da una profonda e radicata passione per il mondo delle due ruote. Inizialmente concentrato sulle moto, il commercio e le continue opportunità mi hanno permesso di espandere i miei orizzonti portandomi, quasi naturalmente, alla vendita di auto.",
                paragrafo2: "La voglia di crescere non si è mai fermata. Negli anni ho deciso di mettere in parallelo alla concessionaria anche il settore edile, di cui mi occupo direttamente. Questa sinergia mi ha spinto a trattare e curare anche mezzi specifici, come quelli per il movimento terra, offrendo un servizio completo per chi cerca mezzi da lavoro stradali o cantieristici.",
                citazione: "Dal mondo delle moto alle auto e al settore edile. Una passione in costante crescita per offrirti sempre il mezzo giusto.",
                nomeFondatore: "Filippo Bongi",
                ruoloFondatore: "Titolare",
                inizialeFondatore: "F"
            },

            firebase: {
                apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
                authDomain: "maxcar-7416d.firebaseapp.com",
                projectId: "maxcar-7416d",
                storageBucket: "maxcar-7416d.firebasestorage.app",
                messagingSenderId: "279232212865",
                appId: "1:279232212865:web:33ab71b8fc8871e8bb4280",
                measurementId: "G-QJWLPQNZQY"
            }
        };

        if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebase);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const COLLECTION_PATH = `veicoli_broker`;

        // Utilizziamo un server professionale (Clearbit) per loghi perfetti e sempre attivi
        const MARCHI_AUTO = [
            { id: 1, src: "https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg", alt: "BMW" },
            { id: 2, src: "https://upload.wikimedia.org/wikipedia/commons/9/90/Mercedes-Logo.svg", alt: "Mercedes" },
            { id: 3, src: "https://upload.wikimedia.org/wikipedia/commons/9/92/Audi-Logo_2016.svg", alt: "Audi" },
            { id: 4, src: "https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.svg", alt: "VW" },
        ];

        const HERO_IMAGES = [
            "https://images.unsplash.com/photo-1560958089-b8a1929cea89?auto=format&fit=crop&q=80&w=1600",
            "https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&q=80&w=1600",
            "https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1600"
        ];

        const HeroSlider = () => {
            const [currentSlide, setCurrentSlide] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentSlide((prev) => (prev + 1) % HERO_IMAGES.length);
                }, 3000); 
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="relative min-h-[85vh] flex items-center justify-center text-center px-4 overflow-hidden">
                    <div className="hero-slider">
                        {HERO_IMAGES.map((img, index) => (
                            <div 
                                key={index}
                                className={`hero-slide ${index === currentSlide ? 'active' : ''}`}
                                style={{ backgroundImage: `url('${img}')` }}
                            ></div>
                        ))}
                        <div className="hero-overlay"></div>
                    </div>
                    <div className="hero-content animate-in fade-in slide-in-from-bottom-10 duration-1000">
                        {CONFIG.logoUrl ? (
                            <img src={CONFIG.logoUrl} alt={CONFIG.nomeConcessionaria} className="h-32 md:h-48 mx-auto mb-8 object-contain drop-shadow-2xl rounded-2xl" />
                        ) : (
                            <h1 className="text-6xl md:text-8xl font-black uppercase italic tracking-tighter mb-6 font-montserrat text-white">{CONFIG.nomeConcessionaria}</h1>
                        )}
                        <p className="text-xl md:text-2xl font-semibold mb-10 text-white drop-shadow-md">{CONFIG.sottotitoloHero}</p>
                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                            <button onClick={() => window.scrollToPiazzale()} className="bg-bongi-orange hover:bg-[#CC4800] text-white px-12 py-5 rounded-full font-bold uppercase transition shadow-2xl hover:scale-105 transform tracking-widest text-sm">Esplora il Piazzale</button>
                            <a href={`tel:${CONFIG.telefonoLink}`} className="bg-white hover:bg-gray-100 text-slate-900 px-12 py-5 rounded-full font-black uppercase transition shadow-2xl hover:scale-105 transform tracking-widest text-sm">Chiama Ora</a>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedCar, setSelectedCar] = useState(null);
            const [autoList, setAutoList] = useState([]);
            
            const [filters, setFilters] = useState({
                condizione: 'Tutte', categoria: 'Tutte', marca: 'Tutte', alimentazione: 'Tutte', prezzoMax: '', kmMax: '', annoMin: ''
            });
            
            const [loading, setLoading] = useState(true);
            const [activeImage, setActiveImage] = useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isFiltersOpen, setIsFiltersOpen] = useState(false);

            useEffect(() => {
                document.title = `${CONFIG.nomeConcessionaria} | ${CONFIG.citta}`;
                window.scrollToPiazzale = () => {
                    setCurrentPage('piazzale');
                    setSelectedCar(null);
                };
            }, []);

            useEffect(() => {
                const init = async () => {
                    try {
                        await auth.signInAnonymously();
                        const unsubscribe = db.collection(COLLECTION_PATH)
                            .onSnapshot(snapshot => {
                                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                const mappedData = data.map(car => ({
                                    ...car,
                                    marca: car.brand || car.marca,
                                    modello: car.model || car.modello,
                                    prezzo: car.price ? String(car.price).replace(/[^0-9]/g, '') : (car.prezzo || 0),
                                    anno: car.year || car.anno,
                                    km: car.mileage ? String(car.mileage).replace(/[^0-9]/g, '') : (car.km || 0),
                                    alimentazione: car.fuel || car.alimentazione,
                                    cambio: car.transmission || car.cambio,
                                    condizione: car.condition || car.condizione || 'Usato',
                                    categoria: car.category || car.categoria || 'Auto',
                                    immagine: (car.images && car.images[0]) ? car.images[0] : (car.immagine || "https://placehold.co/600x400?text=Nessuna+Foto"),
                                    galleria: car.images || car.galleria || [],
                                    descrizione: car.description || car.descrizione,
                                    potenza: car.power ? String(car.power).replace(/[^0-9]/g, '') : car.potenza,
                                    cilindrata: car.displacement ? String(car.displacement).replace(/[^0-9]/g, '') : car.cilindrata,
                                    colore: car.color || car.colore
                                }));
                                setAutoList(mappedData);
                                setLoading(false);
                                const loader = document.getElementById('loader');
                                if (loader) loader.style.opacity = '0';
                                setTimeout(() => { if (loader) loader.style.display = 'none'; }, 500);
                            }, (err) => {
                                console.error("Errore database:", err);
                                setLoading(false);
                            });
                        return () => unsubscribe();
                    } catch (error) {
                        console.error("Errore Auth:", error);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [currentPage, selectedCar]);

            const handleFilterChange = (e) => {
                const { name, value } = e.target;
                setFilters(prev => ({ ...prev, [name]: value }));
            };

            const resetFilters = () => {
                setFilters({ condizione: 'Tutte', categoria: 'Tutte', marca: 'Tutte', alimentazione: 'Tutte', prezzoMax: '', kmMax: '', annoMin: '' });
            };

            const uniqueCondizioni = useMemo(() => ['Tutte', 'Usato', 'Nuovo', 'Km 0'], []);
            const uniqueMarche = useMemo(() => ['Tutte', ...new Set(autoList.map(a => a.marca).filter(Boolean))], [autoList]);
            const uniqueAlimentazioni = useMemo(() => ['Tutte', ...new Set(autoList.map(a => a.alimentazione).filter(Boolean))], [autoList]);
            const uniqueCategorie = useMemo(() => ['Tutte', ...new Set(autoList.map(a => a.categoria).filter(Boolean))], [autoList]);

            const filteredAutos = useMemo(() => {
                return autoList.filter(a => {
                    const condizioneAuto = a.condizione || 'Usato';
                    if (filters.condizione !== 'Tutte' && condizioneAuto !== filters.condizione) return false;
                    if (filters.categoria !== 'Tutte' && a.categoria !== filters.categoria) return false;
                    if (filters.marca !== 'Tutte' && a.marca !== filters.marca) return false;
                    if (filters.alimentazione !== 'Tutte' && a.alimentazione !== filters.alimentazione) return false;
                    if (filters.prezzoMax && Number(a.prezzo) > Number(filters.prezzoMax)) return false;
                    if (filters.kmMax && Number(a.km) > Number(filters.kmMax)) return false;
                    if (filters.annoMin && Number(a.anno) < Number(filters.annoMin)) return false;
                    return true;
                });
            }, [autoList, filters]);

            const openCarDetails = (car) => {
                setSelectedCar(car);
                setActiveImage(car.immagine);
                setCurrentPage('prodotto');
            };

            const carImages = useMemo(() => {
                if (!selectedCar) return [];
                const images = [selectedCar.immagine];
                if (selectedCar.galleria && Array.isArray(selectedCar.galleria)) {
                    selectedCar.galleria.forEach(img => {
                        if (img !== selectedCar.immagine) images.push(img);
                    });
                }
                return images;
            }, [selectedCar]);

            return (
                <div className="min-h-screen flex flex-col overflow-x-hidden w-full">
                    <nav className="bg-white/95 backdrop-blur-md border-b sticky top-0 z-50 px-6 py-4 shadow-sm w-full">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setCurrentPage('home'); setSelectedCar(null); setIsMobileMenuOpen(false); }}>
                                {CONFIG.logoUrl ? (
                                    <img src={CONFIG.logoUrl} alt={CONFIG.nomeConcessionaria} className="h-14 w-auto object-contain drop-shadow-sm rounded-xl" />
                                ) : (
                                    <>
                                        <div className="bg-bongi-orange p-2 rounded-lg text-white">
                                            <i className="fa-solid fa-car text-2xl"></i>
                                        </div>
                                        <span className="font-black uppercase italic tracking-tighter text-xl text-slate-900 font-montserrat">{CONFIG.nomeConcessionaria}</span>
                                    </>
                                )}
                            </div>
                            
                            <div className="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest text-slate-600 font-montserrat">
                                <button onClick={() => { setCurrentPage('home'); setSelectedCar(null); }} className={`hover:text-bongi-orange transition ${currentPage === 'home' ? 'text-bongi-orange' : ''}`}>Home</button>
                                <button onClick={() => { setCurrentPage('piazzale'); setSelectedCar(null); }} className={`hover:text-bongi-orange transition ${currentPage === 'piazzale' ? 'text-bongi-orange' : ''}`}>Piazzale</button>
                                <button onClick={() => { setCurrentPage('vendi'); setSelectedCar(null); }} className={`hover:text-bongi-orange transition ${currentPage === 'vendi' ? 'text-bongi-orange' : ''}`}>Vendi Auto</button>
                                <button onClick={() => { setCurrentPage('chisiamo'); setSelectedCar(null); }} className={`hover:text-bongi-orange transition ${currentPage === 'chisiamo' ? 'text-bongi-orange' : ''}`}>Chi Siamo</button>
                                <button onClick={() => { setCurrentPage('contatti'); setSelectedCar(null); }} className={`hover:text-bongi-orange transition ${currentPage === 'contatti' ? 'text-bongi-orange' : ''}`}>Contatti</button>
                            </div>

                            <button className="md:hidden text-slate-900 focus:outline-none p-2" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                                <i className={`fa-solid ${isMobileMenuOpen ? "fa-xmark" : "fa-bars"} text-2xl`}></i>
                            </button>
                        </div>

                        {isMobileMenuOpen && (
                            <div className="md:hidden absolute top-full left-0 w-full bg-white border-b shadow-2xl flex flex-col py-6 px-8 gap-6 text-sm font-bold uppercase tracking-widest text-slate-600 animate-in slide-in-from-top-2 duration-300 font-montserrat">
                                <button onClick={() => { setCurrentPage('home'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-bongi-orange transition ${currentPage === 'home' ? 'text-bongi-orange' : ''}`}>Home</button>
                                <button onClick={() => { setCurrentPage('piazzale'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-bongi-orange transition ${currentPage === 'piazzale' ? 'text-bongi-orange' : ''}`}>Piazzale</button>
                                <button onClick={() => { setCurrentPage('vendi'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-bongi-orange transition ${currentPage === 'vendi' ? 'text-bongi-orange' : ''}`}>Vendi Auto</button>
                                <button onClick={() => { setCurrentPage('chisiamo'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-bongi-orange transition ${currentPage === 'chisiamo' ? 'text-bongi-orange' : ''}`}>Chi Siamo</button>
                                <button onClick={() => { setCurrentPage('contatti'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-bongi-orange transition ${currentPage === 'contatti' ? 'text-bongi-orange' : ''}`}>Contatti</button>
                            </div>
                        )}
                    </nav>

                    <main className="flex-grow w-full">
                        {/* HOMEPAGE */}
                        {currentPage === 'home' && (
                            <>
                                <HeroSlider />

                                <div className="ticker-wrapper">
                                    <div className="ticker-track">
                                        {[...MARCHI_AUTO, ...MARCHI_AUTO, ...MARCHI_AUTO, ...MARCHI_AUTO].map((brand, idx) => (
                                            <div key={idx} className="slide">
                                                <img src={brand.src} alt={brand.alt} />
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="py-24 px-6 bg-slate-50 border-b">
                                    <div className="max-w-7xl mx-auto">
                                        <div className="text-center mb-16">
                                            <h2 className="text-4xl md:text-5xl font-black uppercase italic tracking-tighter font-montserrat mb-4 text-slate-900">I Nostri <span className="text-bongi-orange">Servizi</span></h2>
                                            <p className="text-slate-500 max-w-2xl mx-auto font-medium">Scopri l'offerta completa di {CONFIG.nomeConcessionaria}. Dai veicoli stradali ai mezzi da lavoro professionali.</p>
                                        </div>
                                        <div className="grid lg:grid-cols-3 gap-10">
                                            {/* SERVIZIO 1: AUTO E MOTO */}
                                            <div className="bg-white p-10 rounded-[2.5rem] shadow-xl hover:shadow-2xl transition duration-300 border-b-4 border-[#FF5A00] group relative overflow-hidden">
                                                <div className="absolute -top-10 -right-10 opacity-5 group-hover:scale-110 transition-transform duration-500"><i className="fa-solid fa-car-side text-[16rem]"></i></div>
                                                <div className="w-16 h-16 bg-orange-50 text-bongi-orange rounded-2xl flex items-center justify-center mb-8 shadow-sm">
                                                    <i className="fa-solid fa-car-side text-3xl"></i>
                                                </div>
                                                <h3 className="font-heading font-black uppercase italic text-2xl mb-4 text-slate-900">Concessionaria <br/>Auto & Moto</h3>
                                                <p className="text-slate-600 text-sm leading-relaxed mb-6">Trattiamo la vendita di automobili e motocicli offrendoti un servizio completo, dalla consulenza fino alla messa su strada del tuo veicolo ideale.</p>
                                                <ul className="text-xs font-bold text-slate-500 space-y-2 uppercase tracking-wide mb-8">
                                                    <li className="flex items-center gap-2"><i className="fa-solid fa-circle-check text-[#0F172A]"></i> Vasta Scelta Multimarca</li>
                                                    <li className="flex items-center gap-2"><i className="fa-solid fa-circle-check text-[#0F172A]"></i> Permuta Usato</li>
                                                </ul>
                                                <button onClick={() => setCurrentPage('vendi')} className="w-full bg-[#FF5A00] hover:bg-[#CC4800] text-white py-3.5 rounded-xl font-bold uppercase tracking-widest text-xs transition-colors flex items-center justify-center gap-2 shadow-md">
                                                    <i className="fa-solid fa-car text-sm"></i> Vendi il tuo veicolo
                                                </button>
                                            </div>
                                            
                                            {/* SERVIZIO 2: NUOVO USATO KM0 */}
                                            <div className="bg-slate-900 p-10 rounded-[2.5rem] shadow-xl hover:shadow-2xl transition duration-300 border-b-4 border-[#FF5A00] group relative overflow-hidden">
                                                <div className="absolute -top-10 -right-10 opacity-5 group-hover:scale-110 transition-transform duration-500"><i className="fa-solid fa-tags text-[16rem] text-white"></i></div>
                                                <div className="w-16 h-16 bg-white/10 text-bongi-orange rounded-2xl flex items-center justify-center mb-8 shadow-sm">
                                                    <i className="fa-solid fa-tags text-3xl"></i>
                                                </div>

                                            <div className="bg-slate-100 p-5 rounded-[2rem] text-slate-800 shadow-sm"><i className="fa-solid fa-phone text-3xl"></i></div>
                                            <div>
                                                <h4 className="font-black uppercase text-xs tracking-widest text-slate-400 mb-2 font-montserrat">Linea Diretta</h4>
                                                {CONFIG.telefoni.map((tel, idx) => (
                                                    <p key={idx} className="text-2xl font-heading font-black text-bongi-orange mb-1">{tel.numero} <span className="text-sm font-medium text-slate-500">({tel.nome})</span></p>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-[#0F172A] text-white p-8 md:p-12 rounded-[3rem] shadow-2xl border-t-8 border-bongi-orange flex flex-col items-center text-center justify-center min-h-[300px] relative overflow-hidden">
                                        <div className="absolute -top-10 -right-10 opacity-5"><i className="fa-solid fa-mobile-screen text-[16rem]"></i></div>
                                        <h3 className="text-3xl font-black uppercase italic mb-8 tracking-tighter font-montserrat relative z-10">Social Network</h3>
                                        <div className="flex flex-col gap-4 w-full relative z-10">
                                            {CONFIG.social.instagram && (
                                                <a href={CONFIG.social.instagram} target="_blank" className="bg-white/10 hover:bg-white/20 text-white py-4 rounded-2xl font-bold uppercase text-xs tracking-widest flex items-center justify-center gap-4 transition-all transform hover:-translate-y-1 border border-white/5 backdrop-blur-sm">
                                                    <i className="fa-brands fa-instagram text-2xl"></i> Instagram
                                                </a>
                                            )}
                                            {CONFIG.social.facebook && (
                                                <a href={CONFIG.social.facebook} target="_blank" className="bg-white/10 hover:bg-white/20 text-white py-4 rounded-2xl font-bold uppercase text-xs tracking-widest flex items-center justify-center gap-4 transition-all transform hover:-translate-y-1 border border-white/5 backdrop-blur-sm">
                                                    <i className="fa-brands fa-facebook-f text-2xl"></i> Facebook
                                                </a>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SEZIONE VENDI */}
                        {currentPage === 'vendi' && (
                            <div className="py-24 px-6 max-w-5xl mx-auto animate-in fade-in duration-700">
                                <h2 className="text-5xl font-black uppercase italic mb-8 text-center font-montserrat text-slate-900">Vendi il tuo <span className="text-bongi-orange">Veicolo</span></h2>
                                <p className="text-center text-slate-500 font-medium mb-12 text-sm max-w-2xl mx-auto">Compila il modulo sottostante con i dati del tuo veicolo per ricevere una valutazione gratuita e senza impegno dal nostro team di esperti.</p>
                                <div className="bg-white p-2 md:p-6 rounded-[2rem] shadow-xl border border-slate-100 flex justify-center w-full h-[900px] overflow-hidden">
                                    <iframe 
                                        src={CONFIG.linkGoogleFormValutazione} 
                                        width="100%" 
                                        height="100%" 
                                        frameBorder="0" 
                                        marginHeight="0" 
                                        marginWidth="0"
                                        className="rounded-xl w-full h-full"
                                    >Caricamento in corso…</iframe>
                                </div>
                            </div>
                        )}

                        {/* SEZIONE CHI SIAMO */}
                        {currentPage === 'chisiamo' && (
                            <div className="py-24 px-6 max-w-7xl mx-auto animate-in fade-in duration-700">
                                <div className="text-center mb-16">
                                    <h2 className="text-5xl md:text-6xl font-black uppercase italic tracking-tighter text-slate-900 mb-6 font-montserrat">Chi <span className="text-bongi-orange">Siamo</span></h2>
                                    <p className="text-xl text-slate-500 font-medium max-w-3xl mx-auto">La passione per i motori al tuo servizio. Scopri la storia di {CONFIG.nomeConcessionaria} e il nostro impegno per garantirti sempre il meglio.</p>
                                </div>

                                <div className="grid lg:grid-cols-2 gap-16 items-center mb-24">
                                    <div className="space-y-6">
                                        <h3 className="text-3xl font-black uppercase italic text-slate-900 font-montserrat">{CONFIG.chiSiamo.titoloOrigini}</h3>
                                        <p className="text-slate-600 leading-relaxed text-lg" dangerouslySetInnerHTML={{__html: CONFIG.chiSiamo.paragrafo1}}></p>
                                        <p className="text-slate-600 leading-relaxed text-lg" dangerouslySetInnerHTML={{__html: CONFIG.chiSiamo.paragrafo2}}></p>
                                    </div>
                                    <div className="bg-[#0F172A] rounded-[3rem] p-8 md:p-12 shadow-2xl text-white relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-8 opacity-10"><i className="fa-solid fa-quote-right text-7xl text-bongi-orange"></i></div>
                                        <div className="relative z-10">
                                            <i className="fa-solid fa-car text-5xl text-white mb-6"></i>
                                            <p className="text-xl md:text-2xl font-light italic leading-relaxed mb-8">
                                                "{CONFIG.chiSiamo.citazione}"
                                            </p>
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-bongi-orange text-white rounded-full flex items-center justify-center font-black text-xl font-montserrat">{CONFIG.chiSiamo.inizialeFondatore}</div>
                                                <div>
                                                    <p className="font-bold uppercase tracking-widest text-xs font-montserrat">{CONFIG.chiSiamo.nomeFondatore}</p>
                                                    <p className="text-slate-400 text-[10px] uppercase tracking-widest">{CONFIG.chiSiamo.ruoloFondatore}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-3 gap-8">
                                    <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-xl transition duration-300">
                                        <div className="w-14 h-14 bg-orange-50 text-bongi-orange rounded-2xl flex items-center justify-center mb-6"><i className="fa-solid fa-magnifying-glass-chart text-2xl"></i></div>
                                        <h4 className="text-xl font-black uppercase italic mb-3 font-montserrat">Selezione Rigorosa</h4>
                                        <p className="text-slate-500 leading-relaxed text-sm">Ogni veicolo proposto viene sottoposto a minuziosi controlli dai nostri esperti, per assicurarti un acquisto sereno e assolutamente senza sorprese.</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-xl transition duration-300">
                                        <div className="w-14 h-14 bg-orange-50 text-bongi-orange rounded-2xl flex items-center justify-center mb-6"><i className="fa-solid fa-handshake text-2xl"></i></div>
                                        <h4 className="text-xl font-black uppercase italic mb-3 font-montserrat">Trasparenza</h4>
                                        <p className="text-slate-500 leading-relaxed text-sm">Crediamo in un rapporto di onestà e fiducia. Nessun costo nascosto o dettaglio omesso: ti forniamo tutta la verità sul veicolo.</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-xl transition duration-300">
                                        <div className="w-14 h-14 bg-orange-50 text-bongi-orange rounded-2xl flex items-center justify-center mb-6"><i className="fa-solid fa-shield-halved text-2xl"></i></div>
                                        <h4 className="text-xl font-black uppercase italic mb-3 font-montserrat">Ampia Scelta</h4>
                                        <p className="text-slate-500 leading-relaxed text-sm">Dalle due ruote, alle quattro ruote, fino ai mezzi da cantiere. Troviamo sempre la soluzione adatta alle tue esigenze lavorative o private.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-[#0F172A] text-white py-16 px-6 mt-auto border-t-[6px] border-bongi-orange">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-3 gap-12 border-b border-white/10 pb-12 mb-8">
                            <div>
                                {CONFIG.logoUrl ? (
                                    <img src={CONFIG.logoUrl} alt={CONFIG.nomeConcessionaria} className="h-20 w-auto object-contain mb-6 drop-shadow-lg rounded-xl" />
                                ) : (
                                    <h4 className="font-heading font-black uppercase italic text-2xl mb-4 text-bongi-orange">{CONFIG.nomeConcessionaria}</h4>
                                )}
                                <p className="text-slate-400 text-sm leading-relaxed mb-6 italic">{CONFIG.descrizioneFooter}</p>
                                <div className="flex gap-4">
                                    {CONFIG.social.instagram && (
                                        <a href={CONFIG.social.instagram} target="_blank" className="hover:scale-110 transition-transform bg-white/5 p-2 rounded-xl border border-white/10 hover:border-bongi-orange">
                                            <i className="fa-brands fa-instagram text-xl text-white"></i>
                                        </a>
                                    )}
                                    {CONFIG.social.facebook && (
                                        <a href={CONFIG.social.facebook} target="_blank" className="hover:scale-110 transition-transform bg-white/5 p-2 rounded-xl border border-white/10 hover:border-[#3b5998]">
                                            <i className="fa-brands fa-facebook-f text-xl text-white"></i>
                                        </a>
                                    )}
                                </div>
                            </div>
                            <div className="space-y-6">
                                <h5 className="font-heading font-black uppercase text-sm tracking-widest text-white">Contatti Rapidi</h5>
                                <div className="flex flex-col gap-5">
                                    {CONFIG.telefoni.map((tel, idx) => (
                                        <a key={idx} href={`tel:${tel.link}`} className="text-slate-300 font-bold hover:text-white transition flex items-center gap-4 group">
                                            <div className="bg-white/5 p-3 rounded-xl group-hover:bg-bongi-orange transition"><i className="fa-solid fa-phone text-sm"></i></div> 
                                            {tel.numero} <span className="font-normal opacity-70">({tel.nome})</span>
                                        </a>
                                    ))}
                                    <a href={`mailto:${CONFIG.email}`} className="text-slate-300 font-bold hover:text-white transition flex items-center gap-4 group break-all">
                                        <div className="bg-white/5 p-3 rounded-xl group-hover:bg-bongi-orange group-hover:text-white transition"><i className="fa-solid fa-envelope text-sm"></i></div> 
                                        {CONFIG.email}
                                    </a>
                                </div>
                            </div>
                            <div className="space-y-6">
                                <h5 className="font-heading font-black uppercase text-sm tracking-widest text-white">Sede Operativa</h5>
                                <div className="text-slate-300 font-bold flex items-start gap-4">
                                    <div className="bg-white/5 p-3 rounded-xl text-bongi-orange mt-1"><i className="fa-solid fa-location-dot text-sm"></i></div>
                                    <span className="leading-relaxed">{CONFIG.indirizzo}<br/><span className="text-slate-500 font-normal">{CONFIG.cap} {CONFIG.citta} ({CONFIG.provinciaBreve})</span></span>
                                </div>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-[10px] font-bold uppercase tracking-widest opacity-40 italic">
                            <span>&copy; {new Date().getFullYear()} {CONFIG.nomeConcessionaria} di Filippo Bongi.</span>
                            <span>{CONFIG.provinciaEstesa}</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
