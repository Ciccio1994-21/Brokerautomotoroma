<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broker Auto&Moto Roma - Di Fabrizio Di Vincenzo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        // Configurazione Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
            authDomain: "maxcar-7416d.firebaseapp.com",
            projectId: "maxcar-7416d",
            storageBucket: "maxcar-7416d.firebasestorage.app",
            messagingSenderId: "279232212865",
            appId: "1:279232212865:web:33ab71b8fc8871e8bb4280",
            measurementId: "G-QJWLPQNZQY"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const analytics = getAnalytics(app);
            window.db = getFirestore(app);
            window.firebaseCollection = collection;
            window.firebaseGetDocs = getDocs;
            window.firebaseInitialized = true;
            console.log("Firebase e Analytics inizializzati correttamente.");
        } catch (error) {
            console.error("Errore inizializzazione Firebase:", error);
        }
    </script>
    <style>
        /* Font primario standard simile a Opel Sans / Myriad Pro */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CONFIG = {
            linkGoogleFormValutazione: "https://docs.google.com/forms/d/e/1FAIpQLSeYtcqgrOejvWqClIlEUneC2LPtTNzf67413H_mxFtcnGdnbw/viewform?embedded=true",
            telefono: "+393755298383",
            telefonoDisplay: "375 529 8383",
            indirizzo: "Via Nettunense 78 - 00047 Marino (RM)"
        };

        const App = () => {
          const [currentPage, setCurrentPage] = useState('Home');
          const [isLoading, setIsLoading] = useState(true);
          const [carsData, setCarsData] = useState([]);
          const [inventoryFilter, setInventoryFilter] = useState('Tutti');
          const [selectedCar, setSelectedCar] = useState(null);
          const [activeImageIndex, setActiveImageIndex] = useState(0);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          const menuItems = [
            { id: 'Home', label: 'Home' },
            { id: 'Inventario', label: 'Parco Veicoli' },
            { id: 'vendi', label: 'Vendi Veicolo' },
            { id: 'chi-siamo', label: 'La Nostra Storia' },
            { id: 'Contatti', label: 'Contatti' }
          ];

          useEffect(() => {
            const fetchFromFirebase = async () => {
              let attempts = 0;
              const checkInterval = setInterval(async () => {
                attempts++;
                if (window.firebaseInitialized && window.db) {
                  clearInterval(checkInterval);
                  try {
                    const fetchPromise = window.firebaseGetDocs(window.firebaseCollection(window.db, "auto"));
                    const timeoutPromise = new Promise((_, reject) => {
                        setTimeout(() => reject(new Error("Timeout Ambiente Protetto")), 4000);
                    });

                    const querySnapshot = await Promise.race([fetchPromise, timeoutPromise]);
                    
                    const cars = [];
                    querySnapshot.forEach((doc) => {
                      cars.push({ id: doc.id, ...doc.data() });
                    });
                    
                    // Imposta sempre le auto reali trovate nel DB, anche se vuoto
                    setCarsData(cars);
                    setIsLoading(false);
                  } catch (e) {
                    console.error("Errore nel recupero dati:", e);
                    setCarsData([]);
                    setIsLoading(false);
                  }
                } else if (attempts > 40) { 
                  clearInterval(checkInterval);
                  setCarsData([]);
                  setIsLoading(false);
                }
              }, 100);
            };

            fetchFromFirebase();
          }, []);

          const navigate = (page, car = null) => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setIsMobileMenuOpen(false);
            if (car) {
              setSelectedCar(car);
              setActiveImageIndex(0);
            }
            setCurrentPage(page);
          };

          const filteredCars = inventoryFilter === 'Tutti' 
            ? carsData 
            : carsData.filter(car => car.category === inventoryFilter);

          const whatsappMessage = selectedCar 
            ? encodeURIComponent(`Salve Fabrizio, vorrei avere maggiori informazioni su ${selectedCar.brand} ${selectedCar.model} vista sul sito Broker Auto&Moto Roma.`) 
            : 'Salve Fabrizio, vorrei avere maggiori informazioni sui vostri servizi di intermediazione.';

          return (
            <div className="min-h-screen bg-white text-slate-800 antialiased flex flex-col">
              
              {/* HEADER DESKTOP */}
              <header className="hidden lg:block relative w-full h-[140px] bg-white z-50 shadow-sm border-b-4 border-[#007A33]">
                <div className="absolute inset-0 pointer-events-none overflow-hidden">
                  <div className="absolute top-0 left-0 w-[42%] h-[90px] bg-gray-100" style={{ clipPath: 'polygon(0 0, 100% 0, 85% 100%, 0 100%)' }}></div>
                </div>
                <div className="relative z-10 max-w-[1440px] mx-auto h-full flex flex-col">
                  <div className="flex h-[90px]">
                    <div className="w-[35%] flex items-center pl-10 cursor-pointer" onClick={() => navigate('Home')}>
                      {/* LOGO */}
                      <img src="Logo.png" alt="Logo Broker Auto&Moto" className="h-[55px] w-auto object-contain drop-shadow-sm" />
                    </div>
                    <div className="w-[65%] flex items-center justify-end gap-8 pr-10">
                       <div className="flex items-center gap-3">
                         <div className="bg-[#007A33]/10 p-2 rounded-full w-8 h-8 flex items-center justify-center"><i className="fa-solid fa-location-dot text-[#007A33]"></i></div>
                         <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase">Sede:</span><span className="text-[12px] font-bold text-gray-800">Marino (RM)</span></div>
                       </div>
                       <div className="flex items-center gap-3">
                         <div className="bg-[#007A33]/10 p-2 rounded-full w-8 h-8 flex items-center justify-center"><i className="fa-solid fa-phone text-[#007A33]"></i></div>
                         <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase">Chiamaci:</span><span className="text-[13px] font-bold text-gray-800">{CONFIG.telefonoDisplay}</span></div>
                       </div>
                       <div className="flex items-center gap-3">
                         <div className="bg-[#007A33]/10 p-2 rounded-full w-8 h-8 flex items-center justify-center"><i className="fa-brands fa-facebook text-[#007A33]"></i></div>
                         <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase">Social:</span><a href="https://www.facebook.com/p/Broker-automoto-Roma-100089381453925/" target="_blank" rel="noreferrer" className="text-[13px] font-bold text-gray-800 hover:text-[#007A33]">Visita la Pagina</a></div>
                       </div>
                    </div>
                  </div>
                  <div className="flex h-[50px] items-center justify-between text-black px-10">
                     <nav className="flex gap-8 pl-[10%] text-[13px] font-bold uppercase tracking-widest h-full items-center">
                       {menuItems.map((item) => (
                         <a 
                            key={item.label} 
                            href="#" 
                            onClick={(e) => { e.preventDefault(); navigate(item.id); }}
                            className={`transition-all duration-300 border-b-2 py-1 ${currentPage === item.id ? 'text-[#007A33] border-[#007A33]' : 'border-transparent text-gray-600 hover:text-[#007A33]'}`}
                         >
                            {item.label}
                         </a>
                       ))}
                     </nav>
                  </div>
                </div>
              </header>

              {/* HEADER MOBILE */}
              <header className="lg:hidden bg-white text-black p-4 flex justify-between items-center sticky top-0 z-50 border-b-4 border-[#007A33] shadow-sm">
                <div className="flex items-center cursor-pointer" onClick={() => navigate('Home')}>
                    <img src="Logo.png" alt="Logo Broker Auto&Moto" className="h-[40px] w-auto object-contain" />
                </div>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                  {isMobileMenuOpen ? <i className="fa-solid fa-xmark text-[30px] text-[#007A33]"></i> : <i className="fa-solid fa-bars text-[30px] text-gray-800"></i>}
                </button>
              </header>

              {/* MENU MOBILE OVERLAY */}
              {isMobileMenuOpen && (
                <div className="lg:hidden fixed inset-0 z-40 bg-[#007A33] pt-28 px-8 text-white flex flex-col gap-6 overflow-y-auto">
                    {menuItems.map(item => (
                        <a key={item.label} href="#" onClick={(e) => { e.preventDefault(); navigate(item.id); }} className={`text-2xl font-bold uppercase tracking-widest border-b border-white/20 pb-3 ${currentPage === item.id ? 'text-black' : ''}`}>{item.label}</a>
                    ))}
                </div>
              )}

              <main className="flex-grow">
                  {/* SCHERMATA DI CARICAMENTO */}
                  {isLoading && currentPage !== 'vendi' && currentPage !== 'chi-siamo' && currentPage !== 'Contatti' && (
                      <div className="flex justify-center items-center py-40">
                          <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-[#007A33]"></div>
                      </div>
                  )}

                  {/* HOME PAGE */}
                  {currentPage === 'Home' && !isLoading && (
                      <>
                          <section className="relative h-[650px] flex items-center justify-center text-center overflow-hidden border-b-8 border-[#007A33]">
                            <div className="absolute inset-0 bg-cover bg-center transition-transform duration-1000 scale-105" style={{ backgroundImage: 'url("https://images.unsplash.com/photo-1560179707-f14e90ef3623?auto=format&fit=crop&q=80&w=1920")' }}>
                              <div className="absolute inset-0 bg-black/80"></div>
                            </div>
                            <div className="relative z-10 px-6 max-w-5xl mx-auto">
                              <h2 className="text-5xl md:text-7xl font-black text-white mb-2 uppercase tracking-wider leading-tight">BROKER <span className="text-[#007A33]">AUTO&MOTO</span></h2>
                              <h3 className="text-xl md:text-3xl font-bold text-gray-300 mb-6 uppercase tracking-widest">Agenzia di Vendita tra Privati</h3>
                              <div className="flex items-center justify-center gap-5 my-8"><div className="h-px w-24 bg-[#007A33]/50"></div><i className="fa-solid fa-handshake text-[30px] text-[#007A33]"></i><div className="h-px w-24 bg-[#007A33]/50"></div></div>
                              <p className="text-white text-lg md:text-xl font-light mb-12 max-w-3xl mx-auto leading-relaxed opacity-90">

                              </p>
                              <button onClick={() => navigate('Inventario')} className="bg-[#007A33] text-white px-12 py-4 rounded-full font-black uppercase tracking-widest hover:bg-black transition-all shadow-lg border-2 border-[#007A33]">SCOPRI I VEICOLI</button>
                            </div>
                          </section>

                          <section className="py-24 bg-gray-50">
                            <div className="max-w-6xl mx-auto px-6">
                              <div className="grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
                                {/* SERVIZIO 1 */}
                                <div className="flex flex-col items-center group bg-white p-10 rounded-3xl shadow-sm hover:shadow-xl transition-all border-b-4 border-transparent hover:border-[#007A33]">
                                  <div className="w-24 h-24 rounded-full bg-[#007A33] flex items-center justify-center mb-8"><i className="fa-solid fa-users text-[38px] text-white"></i></div>
                                  <h3 className="text-xl font-black text-black mb-2 uppercase tracking-tighter">Vendita tra Privati</h3>
                                  <span className="text-[10px] bg-gray-100 text-[#007A33] px-3 py-1 rounded-full font-bold uppercase tracking-widest mb-4">Intermediazione</span>
                                  <p className="text-gray-500 text-sm leading-relaxed">Gestiamo la compravendita tra privati al posto tuo: troviamo l'acquirente, gestiamo le pratiche e garantiamo la massima sicurezza.</p>
                                </div>
                                {/* SERVIZIO 2 */}
                                <div className="flex flex-col items-center group bg-[#007A33] p-10 rounded-3xl shadow-xl transition-all transform md:scale-105">
                                  <div className="w-24 h-24 rounded-full bg-white flex items-center justify-center mb-8"><i className="fa-solid fa-motorcycle text-[38px] text-[#007A33]"></i></div>
                                  <h3 className="text-xl font-black text-white mb-2 uppercase tracking-tighter">Auto & Moto</h3>
                                  <span className="text-[10px] bg-black text-white px-3 py-1 rounded-full font-bold uppercase tracking-widest mb-4">Tutti i veicoli</span>
                                  <p className="text-gray-100 text-sm leading-relaxed">Che sia la tua prima utilitaria, una moto sportiva o un veicolo commerciale (abbiamo esperienza anche coi camion!), ti assistiamo.</p>
                                </div>
                                {/* SERVIZIO 3 */}
                                <div className="flex flex-col items-center group bg-white p-10 rounded-3xl shadow-sm hover:shadow-xl transition-all border-b-4 border-transparent hover:border-[#007A33]">
                                  <div className="w-24 h-24 rounded-full bg-black flex items-center justify-center mb-8"><i className="fa-solid fa-magnifying-glass-chart text-[38px] text-[#007A33]"></i></div>
                                  <h3 className="text-xl font-black text-black mb-2 uppercase tracking-tighter">Valutazione e Perizia</h3>
                                  <span className="text-[10px] bg-gray-100 text-gray-500 px-3 py-1 rounded-full font-bold uppercase tracking-widest mb-4">30 Anni di Esperienza</span>
                                  <p className="text-gray-500 text-sm leading-relaxed">Sfruttiamo l'esperienza da meccanici per offrirti consulenze tecniche, valutazioni reali di mercato e veicoli accuratamente periziati.</p>
                                </div>
                              </div>
                            </div>
                          </section>

                          {/* SEZIONE VEICOLI IN EVIDENZA */}
                          <section className="py-24 bg-white border-t border-gray-100">
                            <div className="max-w-[1200px] mx-auto px-6">
                              <div className="text-center mb-16">
                                <h2 className="text-4xl font-black text-black uppercase tracking-tighter mb-4">VEICOLI IN EVIDENZA</h2>
                                <div className="flex items-center justify-center gap-4 mb-6">
                                  <div className="h-[2px] w-12 bg-gray-200"></div>
                                  <i className="fa-solid fa-car text-[20px] text-[#007A33]"></i>
                                  <div className="h-[2px] w-12 bg-gray-200"></div>
                                </div>
                                <p className="text-gray-500 text-sm max-w-2xl mx-auto">Le migliori occasioni selezionate e verificate dalla nostra agenzia.</p>
                              </div>

                              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {carsData.slice(0, 3).map((car) => (
                                  <div key={car.id} onClick={() => navigate('Dettaglio', car)} className="bg-white rounded-2xl overflow-hidden shadow-lg group cursor-pointer transition-all duration-500 hover:-translate-y-2 border border-gray-100 relative">
                                    <div className="absolute top-4 left-4 z-10">
                                        {car.status === 'Venduta' ? (
                                            <span className="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-md bg-red-600 text-white border border-red-500">
                                                VENDUTA
                                            </span>
                                        ) : (
                                            <span className="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-md bg-black text-white">
                                                {car.category || 'Veicolo'}
                                            </span>
                                        )}
                                    </div>
                                    <div className="relative h-60 overflow-hidden">
                                      <img src={car.images && car.images[0] ? car.images[0] : "https://placehold.co/600x400/eeeeee/999999?text=Nessuna+Foto"} alt={car.model} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                      <div className="absolute top-4 right-4 bg-[#007A33] text-white px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-widest shadow-md">{car.price || 'Trattativa Riservata'}</div>
                                    </div>
                                    <div className="p-8">
                                      <div className="flex items-center gap-2 mb-4">
                                        <div className="w-1.5 h-6 bg-[#007A33] rounded-full"></div>
                                        <h3 className="text-xl font-black text-black uppercase tracking-tighter">{car.brand} {car.model}</h3>
                                      </div>
                                      <p className="text-gray-500 text-sm leading-relaxed mb-8 h-12 overflow-hidden whitespace-pre-line line-clamp-2">{car.description || 'Nessuna descrizione fornita.'}</p>
                                      
                                      <div className="grid grid-cols-3 bg-gray-50 rounded-xl divide-x divide-gray-200">
                                        <div className="py-4 px-1 text-center">
                                          <p className="text-[9px] text-gray-400 font-bold uppercase mb-1">Anno</p>
                                          <p className="text-[11px] font-black text-black truncate">{car.year || '-'}</p>
                                        </div>
                                        <div className="py-4 px-1 text-center">
                                          <p className="text-[9px] text-gray-400 font-bold uppercase mb-1">Cambio</p>
                                          <p className="text-[11px] font-black text-black truncate uppercase">{car.transmission || '-'}</p>
                                        </div>
                                        <div className="py-4 px-1 text-center">
                                          <p className="text-[9px] text-gray-400 font-bold uppercase mb-1">Km</p>
                                          <p className="text-[11px] font-black text-black truncate">{car.mileage || '-'}</p>
                                        </div>
                                      </div>
                                    </div>
                                  </div>
                                ))}
                              </div>
                              
                              {carsData.length > 0 && (
                                <div className="text-center mt-12">
                                  <button onClick={() => navigate('Inventario')} className="border-2 border-[#007A33] text-[#007A33] px-8 py-3 rounded-full font-bold uppercase tracking-widest text-xs hover:bg-[#007A33] hover:text-white transition-all shadow-sm">
                                    Vedi tutti i veicoli
                                  </button>
                                </div>
                              )}
                            </div>
                          </section>
                      </>
                  )}

                  {/* PARCO AUTO/MOTO */}
                  {currentPage === 'Inventario' && !isLoading && (
                      <section className="py-24 bg-gray-50">
                          <div className="max-w-[1200px] mx-auto px-6">
                            <div className="text-center mb-10">
                              <h1 className="text-5xl font-black uppercase tracking-tighter text-black mb-4">Il Nostro Parco Veicoli</h1>
                              <div className="flex items-center justify-center gap-4 mb-8"><div className="h-[2px] w-12 bg-[#007A33]"></div><i className="fa-solid fa-motorcycle text-[20px] text-[#007A33]"></i><div className="h-[2px] w-12 bg-[#007A33]"></div></div>
                              
                              <div className="flex flex-wrap justify-center gap-4 mb-12">
                                  {['Tutti', 'Auto', 'Moto'].map(filter => (
                                      <button 
                                        key={filter}
                                        onClick={() => setInventoryFilter(filter)}
                                        className={`px-8 py-3 rounded-full font-bold uppercase tracking-widest text-xs transition-all shadow-sm ${
                                            inventoryFilter === filter 
                                            ? 'bg-[#007A33] text-white border-2 border-[#007A33]' 
                                            : 'bg-white text-gray-500 border-2 border-gray-200 hover:border-[#007A33] hover:text-[#007A33]'
                                        }`}
                                      >
                                          {filter === 'Tutti' ? 'Tutti i Veicoli' : filter}
                                      </button>
